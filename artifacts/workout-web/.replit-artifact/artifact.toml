kind = "web"
previewPath = "/"
title = "FitForge — AI Workout App"
version = "1.0.0"
id = "artifacts/workout-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23509

[services.development]
run = "pnpm --filter @workspace/workout-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/workout-web", "run", "build" ]
publicDir = "artifacts/workout-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23509"
BASE_PATH = "/"
